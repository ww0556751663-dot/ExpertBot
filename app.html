<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז בקרה - אקספרס-בוט</title>
    <style>
        :root {
            --bg: #020617;
            --primary: #3b82f6;
            --accent: #22d3ee;
            --glass: rgba(15, 23, 42, 0.9);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app-container {
            width: 95%;
            max-width: 900px;
            height: 85vh;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 1.05em;
        }

        .bot-msg {
            align-self: flex-start;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--primary);
        }

        .user-msg {
            align-self: flex-end;
            background: var(--primary);
            color: white;
        }

        .input-area {
            padding: 20px;
            background: rgba(0,0,0,0.2);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: var(--accent); color: black; }

        .ai-status {
            font-size: 0.8em;
            color: var(--accent);
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="chat-header">
        <strong>מערכת אקספרס-בוט - AI פעיל</strong>
        <span style="color: var(--accent); font-size: 0.8em;">● בינה מלאכותית מחוברת</span>
    </div>
    
    <div class="messages" id="chat">
        <div class="msg bot-msg">
            שלום! שמי <strong>אקספרס-בוט</strong>. השתמשתי בבינה מלאכותית כדי להתחבר למערכות האתר. 
            <br><br>
            אני כאן כדי לענות על כל שאלה, להסביר בשפה פשוטה איך הכל עובד, להציג מחירון או לתת הדגמה. מה תרצה לדעת?
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="שאל אותי משהו על האתר או בקש פעולה...">
        <button onclick="runBot()">שלח</button>
    </div>
</div>

<script>
    const isSubscribed = false;

    function runBot() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        const text = input.value.trim();
        if(!text) return;

        chat.innerHTML += `<div class="msg user-msg">${text}</div>`;
        input.value = "";

        setTimeout(() => {
            let reply = "";
            const t = text.toLowerCase();

            // מנגנון בינה מלאכותית - זיהוי כוונות (Intents)
            if (t.includes("מחירון") || t.includes("כמה עולה") || t.includes("מחיר")) {
                reply = "הנה המחירון שלי בשפה פשוטה:<br>• ייעוץ והסברים: חינם<br>• הדגמת יכולות: חינם<br>• פעולה בודדת (חדירה/תיקון): 150₪<br>• מנוי חודשי מלא: 400₪";
            } 
            else if (t.includes("הסבר") || t.includes("מה זה") || t.includes("איך זה עובד") || t.includes("מי אתה")) {
                reply = `
                    <span class="ai-status">מעבד הסבר בבינה מלאכותית...</span>
                    אני העוזר הדיגיטלי שלך. דמיין אותי כרובוט שחוסך לך זמן: <br>
                    1. אני מלמד את המחשב לבצע משימות במקומך (אוטומציה). <br>
                    2. אני עוזר לך לפתור תקלות במחשבים אחרים מרחוק. <br>
                    3. אני בונה "ספרי הוראות" חכמים למחשב כדי שיעבוד בשבילך.
                `;
            }
            else if (t.includes("הדגמה") || t.includes("תראה לי")) {
                reply = "<span class='ai-status'>מפעיל סימולציה חכמה...</span> מזהה שרת מטרה... מתחבר... עוקף הגנות... הצלחתי! כך זה נראה כשאני מבצע פעולה עבורך.";
            }
            else if (t.includes("תודה") || t.includes("שלום")) {
                reply = "בשמחה! אני כאן לכל שאלה על השירותים שלנו.";
            }
            else if (!isSubscribed && (t.includes("תבצע") || t.includes("תחדור") || t.includes("תעשה"))) {
                reply = "אני מזהה שאתה רוצה לעבור לביצוע פעולה. מכיוון שאין מנוי, הבינה המלאכותית שלי מוגבלת כרגע רק למתן תשובות, הסברים וייעוץ על מסלולים.";
            }
            else {
                reply = "<span class='ai-status'>ניתוח שאלה...</span> זו שאלה מעניינת על האתר. בקצרה: אקספרס-בוט נועד להפוך פעולות מחשב מסובכות לקלות ומהירות. תרצה שאפרט על המחירון או על סוגי הפעולות שאני עושה?";
            }

            chat.innerHTML += `<div class="msg bot-msg">${reply}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }, 1200);
    }
</script>

</body>
</html>
