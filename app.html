<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז בקרה - אקספרס-בוט</title>
    <style>
        :root {
            --bg: #020617;
            --primary: #3b82f6;
            --accent: #22d3ee;
            --glass: rgba(15, 23, 42, 0.9);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 95%;
            max-width: 900px;
            height: 85vh;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 1.05em;
        }

        .bot-msg {
            align-self: flex-start;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--primary);
        }

        .user-msg {
            align-self: flex-end;
            background: var(--primary);
            color: white;
        }

        .input-area {
            padding: 20px;
            background: rgba(0,0,0,0.2);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: var(--accent); color: black; }

        .price-box {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 15px;
            margin-top: 10px;
            border-right: 4px solid var(--accent);
            line-height: 1.8;
        }

        .ai-label {
            font-size: 0.75em;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="chat-header">
        <strong>מערכת אקספרס-בוט - AI פעיל</strong>
        <span style="color: var(--accent); font-size: 0.8em;">● בינה מלאכותית מחוברת</span>
    </div>
    
    <div class="messages" id="chat">
        <div class="msg bot-msg">
            שלום! שמי <strong>אקספרס-בוט</strong>. השתמשתי בבינה מלאכותית כדי להתחבר למערכות האתר. 
            <br><br>
            אני כאן כדי לענות על כל שאלה, להסביר בשפה פשוטה איך הכל עובד, להציג מחירון או לתת הדגמה. מה תרצה לדעת?
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="שאל אותי על מחירים, תוכנות או בקש הדגמה...">
        <button onclick="runBot()">שלח</button>
    </div>
</div>

<script>
    const isSubscribed = false;

    function runBot() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        const text = input.value.trim();
        if(!text) return;

        chat.innerHTML += `<div class="msg user-msg">${text}</div>`;
        input.value = "";

        setTimeout(() => {
            let reply = "";
            const t = text.toLowerCase();

            // מחירון מעודכן
            if (t.includes("מחירון") || t.includes("מחיר") || t.includes("כמה עולה")) {
                reply = `
                    <span class="ai-label">שליפת נתוני מחירון מעודכנים...</span>
                    הנה המחירון הרשמי של אקספרס-בוט:
                    <div class="price-box">
                        • <strong>פיתוח תוכנה / אתר אישי:</strong> 90 ₪<br>
                        • <strong>תיקון בעיות במחשב (לכל בקשה):</strong> 15 ₪<br>
                        • <strong>מנוי "כל מה שחלמת עליו":</strong> 150 ₪<br>
                        <small>(המנוי כולל יצירת סרטונים, שירים, תוכנות, אתרים והכל כולל הכל!)</small>
                    </div>
                `;
            } 
            // הסברים בשפה פשוטה
            else if (t.includes("הסבר") || t.includes("מה זה") || t.includes("איך זה עובד")) {
                reply = `
                    <span class="ai-label">ניתוח בבינה מלאכותית...</span>
                    בקיצור ולעניין: אקספרס-בוט הוא העוזר האישי שלך לכל מה שטכנולוגי. <br><br>
                    אני יכול לבנות לך אתר או תוכנה מאפס, לסדר תקלות מעצבנות במחשב שלך מרחוק, ואפילו ליצור בשבילך שירים וסרטונים בגרסת המנוי המלאה. הכל קורה מהר, פשוט ובשפה שכולם מבינים.
                `;
            }
            // הדגמה
            else if (t.includes("הדגמה") || t.includes("תראה לי")) {
                reply = "<span class='ai-label'>מפעיל מצב הדמיה...</span> מתחבר למערכת בדיקה... מבצע סריקת קבצים... מתקן שגיאה וירטואלית... <strong>הסתיים בהצלחה!</strong> כך אני פועל בשבילך.";
            }
            // סינון פעולות ללא מנוי
            else if (!isSubscribed && (t.includes("תבצע") || t.includes("תחדור") || t.includes("תבנה") || t.includes("תתקן"))) {
                reply = "אני מזהה שאתה רוצה לעבור לביצוע פעולה (כמו תיקון או פיתוח). מכיוון שאין לך מנוי פעיל, הבינה המלאכותית שלי מוגבלת כרגע למתן תשובות, הסברים וייעוץ בלבד. בחר מסלול מהמחירון כדי שנתחיל לעבוד.";
            }
            // ברירת מחדל
            else {
                reply = "<span class='ai-label'>מעבד תשובה...</span> זו שאלה טובה. אקספרס-בוט כאן כדי להפוך את הטכנולוגיה לפשוטה עבורך. האם תרצה שאפרט על המחירון החדש או על היכולת שלי לבנות אתרים ותוכנות ב-90 ש\"ח?";
            }

            chat.innerHTML += `<div class="msg bot-msg">${reply}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }, 1100);
    }
</script>

</body>
</html>
