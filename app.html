<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אקספרס-בוט | מערכת ביצוע מאובטחת</title>
    <style>
        :root {
            --bg: #020617;
            --primary: #3b82f6;
            --accent: #22d3ee;
            --glass: rgba(15, 23, 42, 0.95);
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85em;
            color: var(--success);
        }

        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); }

        .messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 1.05em;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .bot-msg { align-self: flex-start; background: rgba(30, 41, 59, 0.8); border: 1px solid var(--primary); }
        .user-msg { align-self: flex-end; background: var(--primary); color: white; }

        .terminal-box {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.9em;
            border: 1px solid #333;
            white-space: pre-wrap;
        }

        .payment-card {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .input-area {
            padding: 25px;
            background: rgba(0,0,0,0.4);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: var(--accent); color: #000; }

        .price-label { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="chat-header">
        <strong>אקספרס-בוט | מערכת מאובטחת</strong>
        <div class="status-indicator"><div class="dot"></div> הגנה פעילה</div>
    </div>
    
    <div class="messages" id="chat">
        <div class="msg bot-msg">
            שלום, אני <strong>אקספרס-בוט</strong>. 
            אני כאן כדי לבצע עבורך פעולות מורכבות במחשב, פיתוח אתרים ותוכנה.
            <br><br>
            לפני כל תשלום אבצע סריקה או הדמיה כדי להבטיח תוצאה מדויקת. מה תרצה שאעשה?
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="הקלד פקודה (למשל: סריקה ותיקון)..." autocomplete="off">
        <button onclick="handleBot()">שלח ביצוע</button>
    </div>
</div>

<script>
    function addMessage(html, type) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `msg ${type}-msg`;
        div.innerHTML = html;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function handleBot() {
        const input = document.getElementById('userInput');
        // הגנה בסיסית מפני הזרקת קוד בקלט
        const rawQuery = input.value.trim();
        if(!rawQuery) return;

        addMessage(rawQuery.replace(/</g, "&lt;"), 'user');
        input.value = "";

        setTimeout(() => {
            const t = rawQuery.toLowerCase();

            if (t.includes("תקן") || t.includes("סדר") || t.includes("בדיקה") || t.includes("סריקה")) {
                const logId = "log-" + Date.now();
                addMessage(`מתחיל בסריקה לאיתור תקלות...<div class="terminal-box" id="${logId}">> Initializing scan...\n> Analyzing system registry...</div>`, 'bot');
                
                setTimeout(() => {
                    const log = document.getElementById(logId);
                    log.innerHTML += `\n> Found: 3 critical errors.\n> Status: Fixable via remote access.`;
                    
                    addMessage(`
                        <strong>אבחון הושלם:</strong> זיהיתי את התקלות ואני יכול לתקן אותן מיידית.
                        <br>מחיר תיקון: <span class="price-label">15 ₪</span>
                        <div class="payment-card">
                            <strong>להעברה ב-Bit/Paybox:</strong><br>
                            מספר טלפון: <strong>[הכנס כאן את המספר שלך]</strong><br>
                            <small>לאחר התשלום רשום "שילמתי" ואבצע את התיקון.</small>
                        </div>
                    `, 'bot');
                }, 2500);
            }
            else if (t.includes("בנה") || t.includes("פתח") || t.includes("אתר") || t.includes("תוכנה")) {
                addMessage(`מתחיל בבניית אפיון טכני עבור: "${rawQuery.replace(/</g, "&lt;")}"...`, 'bot');
                
                setTimeout(() => {
                    addMessage(`
                        <strong>הדמיית פרויקט מוכנה:</strong><br>
                        התוכנה תכלול ממשק משתמש (UI), הגנת נתונים וחיבור למסד נתונים.
                        <br>מחיר פיתוח סופי: <span class="price-label">90 ₪</span>
                        <div class="payment-card">
                            <strong>להעברה ב-Bit/Paybox:</strong><br>
                            מספר טלפון: <strong>[הכנס כאן את המספר שלך]</strong>
                        </div>
                    `, 'bot');
                }, 2000);
            }
            else if (t.includes("מחירון")) {
                addMessage(`מחירון ביצוע:<br>• תיקון: 15₪<br>• פיתוח: 90₪<br>• מנוי הכל כלול: 150₪`, 'bot');
            }
            else if (t.includes("שילמתי")) {
                addMessage("התשלום התקבל. מתחיל בביצוע הפקודה בשטח. נא לא לנתק את החיבור...", 'bot');
                // כאן יבוא לוג ביצוע סופי
            }
            else {
                addMessage("הבנתי. תן לי פקודה ברורה (כמו 'תקן לי את המחשב' או 'בנה לי אתר') ואבצע סריקה מקדימה.", 'bot');
            }
        }, 800);
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleBot(); });
</script>

</body>
</html>
