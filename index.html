<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>EXPERT-BOT | Control Suite</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #010409; --panel: #0d1117; --primary: #238636; --blue: #1f6feb; --border: #30363d; --text: #c9d1d9; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .app-shell { width: 95vw; height: 90vh; max-width: 1200px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; }
        .chat-flow { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 80%; padding: 15px; border-radius: 10px; line-height: 1.5; }
        .bot { align-self: flex-start; background: #161b22; border: 1px solid var(--border); border-right: 4px solid var(--blue); }
        .user { align-self: flex-end; background: var(--blue); color: white; }
        .terminal { background: #000; color: #3fb950; font-family: monospace; padding: 15px; border-radius: 8px; margin-top: 10px; direction: ltr; text-align: left; white-space: pre-wrap; border-left: 3px solid #3fb950; }
        .input-bar { padding: 20px; background: #010409; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 6px; color: white; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="chat-flow" id="chat">
        <div class="bubble bot">
            <b>מערכת Expert-Bot מוכנה.</b><br>
            כדי שאוכל לבצע פעולות, וודא שהפעלת את ה-Agent במחשב שלך.
        </div>
    </div>
    <div class="input-bar">
        <input type="text" id="uInp" placeholder="מה המשימה? (למשל: תפעיל בלוטוס)...">
        <button onclick="sendTask()">הרץ ביצוע</button>
    </div>
</div>

<script>
    // התחברות לשרת המתווך החינמי
    const socket = io('https://expert-bot-relay.onrender.com');
    const chat = document.getElementById('chat');

    function addMsg(text, type) {
        const d = document.createElement('div');
        d.className = `bubble ${type}`;
        d.innerHTML = text;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    // קבלת תשובה אמיתית מהמחשב של הלקוח
    socket.on('command_response', (data) => {
        const lastBotMsg = chat.lastElementChild;
        const term = document.createElement('div');
        term.className = 'terminal';
        term.innerText = `> EXECUTION RESULT:\n${data.data}`;
        lastBotMsg.appendChild(term);
    });

    async function sendTask() {
        const inp = document.getElementById('uInp');
        const q = inp.value.trim();
        if(!q) return;

        addMsg(q, 'user');
        inp.value = "";

        // זיהוי פקודה (לוגיקה מקצועית)
        let cmd = "";
        if(q.includes("בלוטוס")) cmd = "powershell.exe Start-Service bthserv";
        if(q.includes("אינטרנט")) cmd = "ipconfig /all";
        if(q.includes("סרוק")) cmd = "dir C:\\ /s /b | findstr /i .exe";

        if(cmd) {
            addMsg(`<b>מבצע אבחון וביצוע...</b><br>שולח פקודה לסוכן המקומי: <code>${cmd}</code>`, 'bot');
            socket.emit('dispatch_command', { cmd: cmd });
        } else {
            addMsg("משימת פיתוח זוהתה. מחיר אפיון: 90 ₪. האם להמשיך?", 'bot');
        }
    }
</script>
</body>
</html>
