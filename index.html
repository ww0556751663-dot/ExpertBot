<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אקספרס-בוט | פתרונות תוכנה חכמים</title>
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #3b82f6;
            --accent: #10b981;
            --text: #f8fafc;
        }
        body { 
            font-family: 'Assistant', 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text);
        }
        .container { 
            max-width: 800px; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px);
            padding: 60px; 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        h1 { 
            font-size: 4em; 
            margin: 0; 
            background: linear-gradient(to left, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        .tagline { font-size: 1.8em; color: #94a3b8; margin-bottom: 40px; }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }
        .feature-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .feature-box:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--secondary);
        }
        .feature-box strong { display: block; color: var(--accent); margin-bottom: 5px; }

        .cta-button { 
            display: inline-block; 
            padding: 18px 45px; 
            background: var(--secondary); 
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
            transition: 0.3s;
        }
        .cta-button:hover { 
            transform: scale(1.05); 
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.5);
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>אקספרס-בוט</h1>
        <div class="tagline">הדור הבא של פתרונות התוכנה החכמים</div>
        
        <div class="grid">
            <div class="feature-box">
                <strong>אוטומציה מלאה</strong>
                פתרון תקלות ללא מגע יד אדם
            </div>
            <div class="feature-box">
                <strong>אבטחה מתקדמת</strong>
                שליטה מלאה בידיים שלכם
            </div>
            <div class="feature-box">
                <strong>תמיכה מהירה</strong>
                זמן תגובה של שניות בודדות
            </div>
            <div class="feature-box">
                <strong>פיתוח מותאם</strong>
                מערכות בינה מלאכותית אישיות
            </div>
        </div>

        <a href="#" class="cta-button">התחילו עכשיו</a>
    </div>
</body>
</html>
