<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אקספרס-בוט | הכוח לבצע הכל</title>
    <style>
        :root {
            --bg: #020617;
            --primary: #3b82f6;
            --accent: #10b981;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            color: #f8fafc;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 900px;
            width: 92%;
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 70px 40px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 4.5em;
            margin-bottom: 10px;
            background: linear-gradient(to left, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-tagline {
            font-size: 1.8em;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 25px;
        }

        .description {
            font-size: 1.3em;
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .server-status {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            padding: 15px 25px;
            border-radius: 100px;
            display: inline-block;
            font-weight: 600;
            margin-bottom: 40px;
            border: 1px solid var(--accent);
        }

        .cta {
            background: var(--primary);
            color: white;
            padding: 20px 50px;
            border-radius: 100px;
            text-decoration: none;
            font-size: 1.4em;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
            transition: 0.3s;
        }

        .cta:hover {
            transform: scale(1.05);
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>אקספרס-בוט</h1>
        <div class="main-tagline">האתר שיבצע לך את כל הפעולות שאתה רק חולם עליהם</div>
        
        <p class="description">
            נתקלתם בבעיה מורכבת? משהו שלא חשבנו עליו? אל דאגה. 
            בכל רגע שבו תתבקש פעולה חדשה, הרובוט שלנו יתחבר מעצמו לכל השרתים הרלוונטיים ויבצע את העבודה עבורכם – בשיא המהירות ובאישורכם המלא.
        </p>

        <div class="server-status">
            ● מערכת חיבור לשרתים גלובליים פעילה
        </div>

        <br><br>
        <a href="#" class="cta">בואו נגשים חלום</a>
    </div>
</body>
</html>
